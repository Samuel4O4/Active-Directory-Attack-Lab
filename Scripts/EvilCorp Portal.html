<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvilCorp Internal Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:400px;
    background:white;
    border-radius:12px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#111827;
    font-size:32px;
}

.logo p{
    color:#6b7280;
    margin-top:5px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #d1d5db;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.notice{
    margin-top:20px;
    font-size:12px;
    color:#6b7280;
    text-align:center;
}

.footer{
    margin-top:15px;
    text-align:center;
    font-size:11px;
    color:#9ca3af;
}
</style>

</head>

<body>

<div class="login-container">

```
<div class="logo">
    <h1>EvilCorp</h1>
    <p>Internal Employee Portal</p>
</div>

<form>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button type="submit">Sign In</button>
</form>

<div class="notice">
    Authorized personnel only.<br>
    All activity is monitored and logged.
</div>

<div class="footer">
    EvilCorp © 2026
</div>
```

</div>

</body>
</html>
